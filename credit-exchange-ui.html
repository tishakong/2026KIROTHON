<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학점교류 AI 에이전트</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; color: #1d1d1f; }
    
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px; background: #fff; border-bottom: 1px solid #e5e5e5;
    }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .bell { position: relative; font-size: 20px; cursor: pointer; }
    .bell-badge { position: absolute; top: -4px; right: -4px; width: 8px; height: 8px; background: #ff3b30; border-radius: 50%; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: #007aff; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 600; }

    .main { display: flex; height: calc(100vh - 65px); }

    /* Left Panel - Calendar */
    .left-panel { width: 40%; padding: 24px; background: #fff; border-right: 1px solid #e5e5e5; overflow-y: auto; }
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .calendar-header h2 { font-size: 18px; font-weight: 600; }
    .calendar-nav { display: flex; gap: 8px; }
    .calendar-nav button { border: none; background: #f0f0f0; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 14px; }
    
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 24px; }
    .calendar-grid .day-label { text-align: center; font-size: 12px; color: #86868b; padding: 8px 0; font-weight: 500; }
    .calendar-grid .day { text-align: center; padding: 10px 4px; border-radius: 8px; font-size: 14px; position: relative; cursor: pointer; }
    .calendar-grid .day:hover { background: #f5f5f7; }
    .calendar-grid .day.today { background: #007aff; color: #fff; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
    .calendar-grid .day .dot { width: 6px; height: 6px; border-radius: 50%; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); }
    .dot-red { background: #ff3b30; }
    .dot-blue { background: #007aff; }
    .dot-green { background: #34c759; }
    .dot-orange { background: #ff9500; }

    .deadlines h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .deadline-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #f9f9f9; border-radius: 10px; margin-bottom: 8px; }
    .deadline-badge { font-size: 13px; font-weight: 700; color: #ff3b30; min-width: 40px; }
    .deadline-badge.soon { color: #ff9500; }
    .deadline-info { font-size: 14px; }
    .deadline-univ { font-size: 12px; color: #86868b; margin-top: 2px; }

    /* Right Panel */
    .right-panel { width: 60%; display: flex; flex-direction: column; padding: 24px; gap: 20px; overflow-y: auto; }

    .search-section { }
    .search-bar { display: flex; align-items: center; background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 12px 16px; gap: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .search-bar input { border: none; outline: none; flex: 1; font-size: 15px; }
    .search-bar button { border: none; background: #007aff; color: #fff; border-radius: 8px; padding: 8px 16px; font-size: 14px; font-weight: 500; cursor: pointer; }
    
    .filter-chips { display: flex; gap: 8px; margin-top: 12px; }
    .chip { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid #e5e5e5; background: #fff; }
    .chip.active { background: #007aff; color: #fff; border-color: #007aff; }
    .chip.yonsei { border-color: #003876; color: #003876; }
    .chip.ewha { border-color: #00462a; color: #00462a; }
    .chip.sogang { border-color: #9e1b32; color: #9e1b32; }

    .results-section { flex: 1; }
    .results-section h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    
    .course-card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 12px; border: 1px solid #e5e5e5; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .card-univ { font-size: 13px; font-weight: 600; color: #86868b; }
    .card-badge { font-size: 12px; background: #e8f5e9; color: #2e7d32; padding: 4px 10px; border-radius: 12px; font-weight: 500; }
    .card-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
    .card-desc { font-size: 14px; color: #555; margin-bottom: 12px; line-height: 1.5; }
    .card-meta { display: flex; gap: 16px; font-size: 13px; color: #86868b; }
    .card-docs { margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0f0f0; }
    .card-docs span { font-size: 13px; color: #86868b; }
    .card-docs .doc-list { font-size: 13px; color: #1d1d1f; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎓 학점교류 AI 에이전트</h1>
    <div class="header-right"></div>
  </div>

  <div class="main">
    <!-- Left Panel: Calendar -->
    <div class="left-panel">
      <div class="calendar-header">
        <h2>2026년 6월</h2>
        <div class="calendar-nav">
          <button>◀</button>
          <button>▶</button>
        </div>
      </div>

      <div class="calendar-grid">
        <div class="day-label">일</div><div class="day-label">월</div><div class="day-label">화</div><div class="day-label">수</div><div class="day-label">목</div><div class="day-label">금</div><div class="day-label">토</div>
        <div class="day"></div><div class="day">1</div><div class="day">2</div><div class="day">3</div><div class="day">4</div><div class="day">5</div><div class="day">6</div>
        <div class="day">7</div><div class="day">8</div><div class="day">9<span class="dot dot-blue"></span></div><div class="day">10</div><div class="day">11</div><div class="day">12</div><div class="day">13</div>
        <div class="day">14</div><div class="day">15<span class="dot dot-green"></span></div><div class="day today">16</div><div class="day">17</div><div class="day">18</div><div class="day">19</div><div class="day">20</div>
        <div class="day">21</div><div class="day">22<span class="dot dot-red"></span></div><div class="day">23<span class="dot dot-orange"></span></div><div class="day">24</div><div class="day">25</div><div class="day">26</div><div class="day">27</div>
        <div class="day">28</div><div class="day">29</div><div class="day">30</div><div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div>
      </div>

      <div class="deadlines">
        <h3>📅 다가오는 마감</h3>
        <p style="color:#86868b; font-size:14px; padding:12px 0;">로딩 중...</p>
      </div>
    </div>

    <!-- Right Panel: Search + Results -->
    <div class="right-panel">
      <div class="search-section">
        <div class="search-bar">
          <span>🔍</span>
          <input type="text" placeholder="듣고 싶은 과목명을 입력하세요 (예: 데이터구조, 알고리즘)">
          <button>검색</button>
        </div>
        <div class="filter-chips">
          <span class="chip active">전체</span>
          <span class="chip yonsei">연세대</span>
          <span class="chip ewha">이화여대</span>
          <span class="chip sogang">서강대</span>
        </div>
      </div>

      <div class="results-section">
        <h3>🎯 과목을 검색해보세요</h3>
        <p style="color:#86868b; padding:20px 0;">위 검색창에 듣고 싶은 과목명을 입력하면 매칭 결과가 여기에 표시됩니다.</p>
      </div>
    </div>
  </div>
  <script>
    const API_BASE = "http://localhost:8000";

    // DOM 요소 캐싱
    const searchInput = document.querySelector(".search-bar input");
    const searchBtn = document.querySelector(".search-bar button");
    const resultsSection = document.querySelector(".results-section");
    const filterChips = document.querySelectorAll(".chip");

    let currentFilter = "전체";
    let lastResults = [];

    // 대학 ID → 한글 매핑
    const UNIV_MAP = {
      yonsei: "연세대학교",
      sogang: "서강대학교",
      hongik: "홍익대학교",
      sookmyung: "숙명여자대학교",
      ewha: "이화여자대학교",
    };

    // 검색 실행
    async function doSearch(query) {
      if (!query.trim()) return;
      resultsSection.innerHTML = `<h3>🔍 검색 중...</h3>`;

      try {
        const res = await fetch(`${API_BASE}/api/search?q=${encodeURIComponent(query)}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        lastResults = data.matches || [];
        renderResults(lastResults, data.apply_info || []);
      } catch (err) {
        resultsSection.innerHTML = `<h3>⚠️ 오류</h3><p>${err.message}</p>`;
      }
    }

    // 결과 렌더링
    function renderResults(matches, applyInfo) {
      // 필터 적용
      let filtered = matches;
      if (currentFilter !== "전체") {
        filtered = matches.filter((m) => {
          const univName = UNIV_MAP[m.course.university_id] || m.course.university_id;
          return univName.includes(currentFilter);
        });
      }

      if (filtered.length === 0) {
        resultsSection.innerHTML = `<h3>🎯 검색 결과</h3><p style="color:#86868b; padding:20px 0;">일치하는 과목이 없습니다.</p>`;
        return;
      }

      // 대학별 서류 정보 맵
      const applyMap = {};
      for (const info of applyInfo) {
        applyMap[info.id] = info;
      }

      let html = `<h3>🎯 검색 결과 (${filtered.length}건)</h3>`;
      for (const m of filtered) {
        const course = m.course;
        const univName = UNIV_MAP[course.university_id] || course.university_id;
        const dept = course.department || "";
        const credits = course.credits ? `📚 ${course.credits}학점` : "";
        const desc = course.description || m.reason || "";
        const info = applyMap[course.university_id];
        const docs = info && info.documents.length > 0
          ? `<div class="card-docs"><span>📋 필요서류:</span><div class="doc-list">${info.documents.join(", ")}</div></div>`
          : "";
        const applyEnd = info && info.apply_end
          ? `<span>📅 마감: ${info.apply_end}</span>`
          : "";

        html += `
          <div class="course-card">
            <div class="card-header">
              <span class="card-univ">${univName}${dept ? " · " + dept : ""}</span>
              <span class="card-badge">✓ 인정가능</span>
            </div>
            <div class="card-title">${escapeHtml(course.title)}</div>
            <div class="card-desc">${escapeHtml(desc)}</div>
            <div class="card-meta">
              ${credits ? `<span>${credits}</span>` : ""}
              ${applyEnd}
              ${course.source_url ? `<a href="${course.source_url}" target="_blank" style="color:#007aff;">상세보기</a>` : ""}
            </div>
            ${docs}
          </div>`;
      }
      resultsSection.innerHTML = html;
    }

    // XSS 방지용 이스케이프
    function escapeHtml(str) {
      if (!str) return "";
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    // 캘린더 일정 로드
    async function loadCalendar() {
      try {
        const res = await fetch(`${API_BASE}/api/calendar`);
        if (!res.ok) return;
        const events = await res.json();
        renderDeadlines(events);
      } catch (err) {
        console.warn("캘린더 로드 실패:", err.message);
      }
    }

    // 마감 일정 렌더링
    function renderDeadlines(events) {
      const deadlinesEl = document.querySelector(".deadlines");
      if (!events.length) return;

      const today = new Date();
      const upcoming = events
        .map((e) => ({ ...e, endDate: new Date(e.end) }))
        .filter((e) => e.endDate >= today)
        .sort((a, b) => a.endDate - b.endDate)
        .slice(0, 5);

      if (!upcoming.length) return;

      let html = `<h3>📅 다가오는 마감</h3>`;
      for (const ev of upcoming) {
        const dDay = Math.ceil((ev.endDate - today) / (1000 * 60 * 60 * 24));
        const badgeClass = dDay <= 7 ? "deadline-badge" : "deadline-badge soon";
        html += `
          <div class="deadline-item">
            <span class="${badgeClass}">D-${dDay}</span>
            <div>
              <div class="deadline-info">${escapeHtml(ev.title)}</div>
              ${ev.url ? `<a href="${ev.url}" target="_blank" style="font-size:12px; color:#007aff;">신청 바로가기</a>` : ""}
            </div>
          </div>`;
      }
      deadlinesEl.innerHTML = html;
    }

    // 이벤트 바인딩
    searchBtn.addEventListener("click", () => doSearch(searchInput.value));
    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") doSearch(searchInput.value);
    });

    filterChips.forEach((chip) => {
      chip.addEventListener("click", () => {
        filterChips.forEach((c) => c.classList.remove("active"));
        chip.classList.add("active");
        currentFilter = chip.textContent.trim();
        if (lastResults.length) renderResults(lastResults, []);
      });
    });

    // 초기 로드: 캘린더 일정
    loadCalendar();
  </script>
</body>
</html>
